version: '3.9'
services:
  web:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env.example
    volumes:
      - ./app/uploads:/app/app/uploads
    depends_on:
      - db
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ticketing_db
      POSTGRES_USER: ticket_user
      POSTGRES_PASSWORD: ticket_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
